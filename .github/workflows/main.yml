name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: 'Deine Netlify URL'
        required: true
        default: 'https://todo-pro.netlify.app'

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build TWA APK directly with Gradle
        run: |
          HOST=$(echo '${{ github.event.inputs.site_url }}' | sed 's|https://||' | sed 's|http://||' | sed 's|/.*||')
          URL='${{ github.event.inputs.site_url }}'

          mkdir -p TodoProApp/app/src/main/res/values
          mkdir -p TodoProApp/app/src/main/res/xml
          mkdir -p TodoProApp/app/src/main/java/com/todopro/app

          # settings.gradle
          cat > TodoProApp/settings.gradle << 'EOF'
          pluginManagement {
            repositories {
              google()
              mavenCentral()
              gradlePluginPortal()
            }
          }
          dependencyResolutionManagement {
            repositories {
              google()
              mavenCentral()
            }
          }
          rootProject.name = "TodoPro"
          include ':app'
          EOF

          # root build.gradle
          cat > TodoProApp/build.gradle << 'EOF'
          plugins {
            id 'com.android.application' version '8.2.0' apply false
          }
          EOF

          # app/build.gradle
          cat > TodoProApp/app/build.gradle << EOF
          plugins {
            id 'com.android.application'
          }
          android {
            namespace 'com.todopro.app'
            compileSdk 34
            defaultConfig {
              applicationId "com.todopro.app"
              minSdk 19
              targetSdk 34
              versionCode 1
              versionName "1.0"
            }
            buildTypes {
              release {
                minifyEnabled false
              }
            }
          }
          dependencies {
            implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          EOF

          # AndroidManifest.xml
          cat > TodoProApp/app/src/main/AndroidManifest.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET"/>
            <application
              android:label="Todo Pro"
              android:theme="@style/AppTheme"
              android:allowBackup="true">
              <activity
                android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                android:exported="true">
                <meta-data
                  android:name="android.support.customtabs.trusted.DEFAULT_URL"
                  android:value="${URL}"/>
                <intent-filter android:autoVerify="true">
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
                <intent-filter android:autoVerify="true">
                  <action android:name="android.intent.action.VIEW"/>
                  <category android:name="android.intent.category.DEFAULT"/>
                  <category android:name="android.intent.category.BROWSABLE"/>
                  <data android:scheme="https" android:host="${HOST}"/>
                </intent-filter>
              </activity>
            </application>
          </manifest>
          EOF

          # strings.xml
          cat > TodoProApp/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <string name="app_name">Todo Pro</string>
          </resources>
          EOF

          # styles.xml
          cat > TodoProApp/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="AppTheme" parent="android:Theme.Black.NoTitleBar.Fullscreen"/>
          </resources>
          EOF

          # gradle wrapper
          mkdir -p TodoProApp/gradle/wrapper
          cat > TodoProApp/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          cd TodoProApp
          gradle wrapper --gradle-version 8.2 --no-daemon || true
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TodoPro-APK
          path: TodoProApp/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
