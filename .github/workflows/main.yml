name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: 'Deine Netlify URL'
        required: true
        default: 'https://todo-pro.netlify.app'

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap non-interactive
        run: npm install -g @bubblewrap/cli

      - name: Create twa.json config manually
        run: |
          HOST=$(echo '${{ github.event.inputs.site_url }}' | sed 's|https://||' | sed 's|http://||' | sed 's|/||g')
          JAVA_PATH=$(dirname $(dirname $(readlink -f $(which java))))
          
          mkdir -p twa
          cat > twa/twa-manifest.json << EOF
          {
            "packageId": "com.todopro.app",
            "host": "${HOST}",
            "name": "Todo Pro",
            "launcherName": "Todo Pro",
            "display": "standalone",
            "themeColor": "#050505",
            "navigationColor": "#050505",
            "navigationColorDark": "#050505",
            "navigationDividerColor": "#050505",
            "navigationDividerColorDark": "#050505",
            "backgroundColor": "#050505",
            "enableNotifications": true,
            "startUrl": "/",
            "iconUrl": "${{ github.event.inputs.site_url }}/unnamed.png",
            "maskableIconUrl": "${{ github.event.inputs.site_url }}/unnamed.png",
            "monochromeIconUrl": "${{ github.event.inputs.site_url }}/unnamed.png",
            "splashScreenFadeOutDuration": 300,
            "signingKey": {
              "path": "./android.keystore",
              "alias": "android"
            },
            "appVersionCode": 1,
            "appVersion": "1.0.0",
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "${{ github.event.inputs.site_url }}/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": false,
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "${{ github.event.inputs.site_url }}/",
            "minSdkVersion": 19,
            "orientation": "portrait",
            "fingerprints": [],
            "sdkVersion": 34,
            "sdkVersionName": "34",
            "jdkPath": "${JAVA_PATH}"
          }
          EOF

      - name: Build APK with Bubblewrap
        run: |
          cd twa
          bubblewrap build --skipPwaValidation --manifest ./twa-manifest.json

      - name: Find and upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TodoPro-APK
          path: |
            twa/*.apk
            twa/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
          retention-days: 30
